<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<title>system</title>

<style>

body{
  background:black;
  color:#00ff00;
  font-family:monospace;
  font-size:20px;
  padding:40px;
}

#terminal{
  white-space:pre-line;
}

.cursor{
  display:inline-block;
  width:10px;
  height:20px;
  background:#00ff00;
  margin-left:4px;
  animation:blink 1s infinite;
}

@keyframes blink{
  50%{opacity:0;}
}

.progress{
  width:320px;
  height:12px;
  border:1px solid #00ff00;
  margin-top:20px;
}

.bar{
  height:100%;
  width:0%;
  background:#00ff00;
  transition:width .15s linear;
}

</style>
</head>

<body>

<div id="terminal"></div>
<span class="cursor"></span>

<div class="progress">
<div class="bar" id="bar"></div>
</div>

<script>

const terminal = document.getElementById("terminal")
const bar = document.getElementById("bar")

let lines = []

async function getData(){

  try{

    const res = await fetch("https://ipapi.co/json/")
    const data = await res.json()

    lines = [
      "> establishing connection...",
      "> scanning visitor...",
      "> ip detected: " + data.ip,
      "> location: " + data.city + ", " + data.country_name,
      "> scanning open ports...",
      "> partial access granted...",
      "> warning: nao clica na porra de qqlr link q vc ve por ai crl, ta querendo virar pastinha no doxbin?kkkkkkkkkk"
    ]

  }catch{

    lines = [
      "> establishing connection...",
      "> scanning visitor...",
      "> ip detected...",
      "> location unknown",
      "> scanning open ports...",
      "> partial access granted..."
    ]

  }

  type()

}

let line = 0
let char = 0

function type(){

  if(line >= lines.length) return

  const current = lines[line]

  if(char < current.length){
    terminal.textContent += current[char]
    char++
    setTimeout(type,30)
  }else{
    terminal.textContent += "\n"
    line++
    char = 0
    setTimeout(type,350)
  }

}

function progress(){

  let value = 0

  const loop = setInterval(()=>{

    value += Math.random()*7
    value = Math.min(value,100)

    bar.style.width = value + "%"

    if(value >= 100){
      clearInterval(loop)
    }

  },120)

}

getData()
progress()

</script>

</body>
</html>
