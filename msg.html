<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>system</title>

<style>
body{
  background:#000;
  color:#00ff00;
  font-family:monospace;
  font-size:18px;
  padding:40px;
  margin:0;
}

#terminal{
  white-space:pre-line;
  min-height:400px;
}

.cursor{
  display:inline-block;
  width:10px;
  height:20px;
  background:#00ff00;
  margin-left:4px;
  animation:blink 1s infinite;
}

@keyframes blink{
  50%{opacity:0;}
}

.progress{
  width:320px;
  height:12px;
  border:1px solid #00ff00;
  margin-top:25px;
  margin-bottom:25px;
}

.bar{
  height:100%;
  width:0%;
  background:#00ff00;
  transition:width .15s linear;
}

.warning {
  color: #ff0000;
  margin-top: 30px;
  font-weight: bold;
  text-align: center;
  animation: pulse 0.8s infinite;
}

@keyframes pulse {
  0%, 100% { opacity: 1; }
  50% { opacity: 0.6; }
}
</style>
</head>

<body>

<div id="terminal"></div>
<span class="cursor"></span>

<div class="progress">
<div class="bar" id="bar"></div>
</div>

<div class="warning" id="warning"></div>

<script>

const terminal = document.getElementById("terminal")
const bar = document.getElementById("bar")
const warning = document.getElementById("warning")

let userIP="..."
let country="..."
let city="..."
let region="..."
let isp="..."
let timezone="..."

let lines=[
"> establishing connection...",
"> locating target ip...",
"> scanning network...",
"> scanning open ports...",
"> mapping vulnerabilities...",
"> partial access granted...",
"> accessing personal data...",
"> collecting network metadata...",
"> [IP: "+userIP+"]",
"> [Country: "+country+"]",
"> [Region: "+region+"]",
"> [City: "+city+"]",
"> [ISP: "+isp+"]",
"> [Timezone: "+timezone+"]",
"> [!] WARNING: YOUR INFORMATION HAS BEEN LOGGED",
"> nao saia clicando em links aleatorios porra, ta querendo virar pastinha no doxbin?"
]

let line=0
let char=0

async function getIPInfo(){

try{

const response=await fetch("https://ipapi.co/json/?format=json")
const data=await response.json()

userIP=data.ip
country=data.country_name
city=data.city
region=data.region
isp=data.org
timezone=data.timezone

lines[8]="> [IP: "+userIP+"]"
lines[9]="> [Country: "+country+"]"
lines[10]="> [Region: "+region+"]"
lines[11]="> [City: "+city+"]"
lines[12]="> [ISP: "+isp+"]"
lines[13]="> [Timezone: "+timezone+"]"

}catch(e){

lines[8]="> [IP: Unable to fetch]"
lines[9]="> [Country: Unknown]"

}

}

function type(){

if(line>=lines.length){
warning.textContent="⚠️  SUA INFORMAÇÃO FOI REGISTRADA  ⚠️"
return
}

const current=lines[line]

if(char<current.length){

terminal.textContent+=current[char]
char++

setTimeout(type,40)

}else{

terminal.textContent+="\n"
line++
char=0

setTimeout(type,300)

}

}

function progress(){

let value=0

const loop=setInterval(function(){

value+=Math.random()*6
value=Math.min(value,100)

bar.style.width=value+"%"

if(value>=100){
clearInterval(loop)
}

},130)

}

getIPInfo().then(()=>{
type()
progress()
})

</script>

</body>
</html>
