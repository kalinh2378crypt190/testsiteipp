<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">

<style>
body{
  background:black;
  color:#00ff00;
  font-family:monospace;
  font-size:22px;
  padding:40px;
}

.cursor{
  display:inline-block;
  width:10px;
  background:#00ff00;
  animation:blink 1s infinite;
}

@keyframes blink{
  50%{opacity:0;}
}
</style>

</head>

<body>

<div id="terminal"></div><span class="cursor"></span>

<script>

const text = [
"> estabelecendo conexão...",
"> localizando ip do alvo...",
"> accessando network...",
"> n fode cr... n sai clicando em qqlr link q vc ve por ai... ta querendo virar pastinha no dobxinkkkkk"
];

let line = 0;
let char = 0;

function type(){
  if(line < text.length){
    if(char < text[line].length){
      document.getElementById("terminal").innerHTML += text[line][char];
      char++;
      setTimeout(type,40);
    }else{
      document.getElementById("terminal").innerHTML += "<br>";
      line++;
      char = 0;
      setTimeout(type,400);
    }
  }
}

type();

</script>

</body>
</html>
